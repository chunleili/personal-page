<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Redirecting to chunleili.github.io</title>
<script>
  // Preserve the path: /personal-page/files/cv.pdf -> /files/cv.pdf
  var target = "https://chunleili.github.io" +
    location.pathname.replace(/^\/personal-page\/?/, "/") +
    location.search + location.hash;
  location.replace(target);
</script>
<meta http-equiv="refresh" content="0; url=https://chunleili.github.io/">
<link rel="canonical" href="https://chunleili.github.io/">
</head>
<body>
This site has moved to <a href="https://chunleili.github.io/">https://chunleili.github.io/</a>.
</body>
</html>
